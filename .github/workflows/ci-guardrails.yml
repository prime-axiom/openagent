name: CI Guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-guardrails-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + Baseline + Critical Flows
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint boundaries
        run: npm run lint:boundaries

      - name: Baseline unit checks
        run: npm run baseline:unit

      - name: Baseline API checks
        run: npm run baseline:api

      - name: Critical flow verification
        run: npm run verify:critical-flows
